# render.yaml - Multiple required variables
services:
  - type: web
    name: nodejs-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # Will ask for this
      - key: SESSION_ID
        sync: false
      
      # Will ask for this too
      - key: API_SECRET_KEY
        sync: false
      
      # Will ask for this as well
      - key: ADMIN_PASSWORD
        sync: false
      
      # Auto-generated (no prompt)
      - key: INTERNAL_TOKEN
        generateValue: true
      
      # Hardcoded (no prompt)
      - key: DEFAULT_TIMEOUT
        value: "30000"
