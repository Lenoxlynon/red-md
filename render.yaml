# render.yaml - Fixed Version
services:
  - type: web
    name: nodejs-app
    runtime: node
    plan: free
    repo: https://github.com/darknessfeeenetsquad/red-md
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SESSION_ID
        generateValue: true
